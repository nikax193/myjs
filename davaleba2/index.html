<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Code & Coffee</title>
</head>
<body>

    <h2>☕ შეუკვეთე ყავა</h2>
    
    <form id="orderForm">
        <label for="coffeeType">აირჩიე ყავა:</label>
        <select id="coffeeType">
            <option value="espresso">ესპრესო</option>
            <option value="latte">ლატე</option>
            <option value="cappuccino">კაპუჩინო</option>
        </select>
        <br><br>
        
        <label for="quantity">რაოდენობა:</label>
        <input type="number" id="quantity" value="1">
        <br><br>
        
        <button type="submit">შეკვეთა</button>
    </form>

    <script src="index.js"></script>
</body>
</html>
